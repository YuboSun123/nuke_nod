#   理念
 nuclear_state_idea:0 "核武之邦"
 nuclear_state_idea_desc:0 "• 打击范围: §G[?ROOT.max_deterrence_range|0]§! km\n• 覆盖国家: §G[?ROOT.deterrence_countries_in_range_count|0]§! 个\n• $nuclear_bomb$: §G[?ROOT.num_of_nukes]§! 颗\n• $rocket_site$: §G[?total_constructed_rocket_site]§! 座\n• $nuclear_missile_equipment_1$: §G[?ROOT.num_equipment@nuclear_missile_equipment_1]§! 枚\n• $nuclear_missile_equipment_2$: §G[?ROOT.num_equipment@nuclear_missile_equipment_2]§! 枚\n\n当§H[ROOT.GetName]§!掌握可覆盖洲际射程的核打击力量时,其外交政策便拥有了撬动国际秩序的杠杆"

 nuke_repair_admin_collapse_idea:0 "行政崩溃"
 nuke_repair_admin_collapse_idea_desc:0 "首都遭受核毁灭性打击后，中央机关一度瘫痪，通讯与后勤体系支离破碎，大量官员与平民恐慌外逃。直到临时首都与新指挥体系稳定之前，国家将陷入短暂的混乱。"

 deterrence_state_idea:0 "悬剑于顶"
 deterrence_state_idea_desc:0 "• 威慑来源: [?ROOT.deterrence_primary_source.GetFlag] §Y[?ROOT.deterrence_primary_source.GetName]§!\n\n§H[ROOT.GetFlag][ROOT.GetName]§!首都所在地区§H[ROOT.capital.GetName]§!时刻面临着核武器的威胁,随时可能遭受毁灭性的打击,这种朝不保夕的处境使其国内民众人心惶惶,现任总统§H[ROOT.GetLeader]§!必须小心处理外交与国防事务。"

