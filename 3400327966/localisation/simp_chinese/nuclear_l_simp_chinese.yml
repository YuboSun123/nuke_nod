#   事件
 publication_nuclear.1.t:0 "[FROM.GetNameDefCap] 向世界宣告核武器的诞生！"
 publication_nuclear.1.d:0 "[FROM.GetNameDef]国家电视台宣布这一震撼性消息 \n 「经过数年秘密攻关，我们的科学家们成功突破了原子能的最后屏障，科学的力量已撕裂物质的核心，我们手中现在握着诸神的雷霆，历史在此刻被永久改写,[FROM.GetName]已成为世界上掌握核武器技术的国家」\n\n 此刻，各国反应剧烈而复杂，外交使节纷纷试探[FROM.GetName]的意图，报纸头版充斥着末日预言，他们的领导人紧急召开内阁会议，有人主张立即妥协，也有人叫嚣着...... "
 publication_nuclear.1.a: "颤抖吧"

 publication_nuclear.2.t:0 "[FROM.GetNameDefCap] 震惊世界！国际战略格局随之改变 "
 publication_nuclear.2.d:0 "\n[FROM.GetNameDefCap]瞬间获得压倒性军事优势，人们对武器威力的传统认知被彻底颠覆,其震撼远不止于一声巨响和一朵蘑菇云。它像一道劈开历史夜空的强光，瞬间重塑了人类对力量、战争乃至自身命运的认知。这种震惊感，混合了恐惧、敬畏和一种难以言喻的未知，这种震惊感迫使人类第一次必须认真思考自身整体性毁灭的可能性，并在核时代的阴影下，始终艰难地探索着和平与生存的道路\n\n尽管原子弹有着毁灭性的副作用,但其毁灭性的巨大威力也开启了核军备竞赛的帷幕...... "
 publication_nuclear.2.a: "天呢！" 

