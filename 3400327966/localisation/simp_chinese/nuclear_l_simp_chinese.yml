 bombing_for_state_modifier_desc:0 "此州正遭受持续的战略轰炸。基础设施与工厂反复被毁，交通与生产秩序严重受扰，民众恐慌加剧；在空袭压力解除前，本州的建设与运转将长期陷入瘫痪。"
 homeless_work_disruption_state_modifier:0 "百废待兴"
 homeless_work_disruption_state_modifier_desc:0 "此州大量居民流离失所，生产与公共服务需要优先转向安置与应急保障，导致本州短期停工与效率下降。"

