#   Events
publication_nuclear.1.t:0 "[FROM.GetNameDefCap] Announces Nuclear Weapons!"
publication_nuclear.1.d:0 "[FROM.GetNameDef] TV announces: 'After years of secret work, our scientists have split the atom. We now hold the thunder of the gods. History is changed forever. [FROM.GetName] joins the nuclear club.'\n\nThe world is shocked. Diplomats scramble, headlines warn of doomsday, leaders debate peace or escalation."
publication_nuclear.1.a: "Tremble!"
publication_nuclear.2.t:0 "[FROM.GetNameDefCap] Shocks the World!"
publication_nuclear.2.d:0 "[FROM.GetNameDefCap] gains overwhelming military power. The world is forced to rethink war and peace in the nuclear age. The arms race begins..."
publication_nuclear.2.a: "My god!"
