nuclear_state_idea_desc:0 "• Strike Range: §G[?ROOT.max_deterrence_range|0]§! km\n• Covered Countries: §G[?ROOT.deterrence_countries_in_range_count|0]§!\n• $nuclear_bomb$: §G[?ROOT.num_of_nukes]§!\n• $rocket_site$: §G[?total_constructed_rocket_site]§!\n• $nuclear_missile_equipment_1$: §G[?ROOT.num_equipment@nuclear_missile_equipment_1]§!\n• $nuclear_missile_equipment_2$: §G[?ROOT.num_equipment@nuclear_missile_equipment_2]§!\n\nWith ICBM range, [ROOT.GetName] can leverage nuclear power in diplomacy."
nuke_repair_admin_collapse_idea:0 "Admin Collapse"
nuke_repair_admin_collapse_idea_desc:0 "After a nuclear strike on the capital, the government collapses, panic spreads, and the nation is in chaos until a new command is established."
deterrence_state_idea:0 "Sword Overhead"
deterrence_state_idea_desc:0 "• Deterrence Source: [?ROOT.deterrence_primary_source.GetFlag] §Y[?ROOT.deterrence_primary_source.GetName]§!\n\n§H[ROOT.GetFlag][ROOT.GetName]§!'s capital is under nuclear threat, causing unrest and forcing careful diplomacy."
