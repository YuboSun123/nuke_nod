#   Game Rules
RULE_REALISTIC_NUKES:0 "Nuclear Damage Switch"
RULE_NUKES_KILED_POPULATION:0 "Population Damage"
RULE_OPTION_NUKES_KILED_POPULATION_CLOTURE:0 "Off"
RULE_NUKES_KILED_POPULATION_CLOTURE_DESC:0 "Same as vanilla."
RULE_OPTION_NUKES_KILED_POPULATION_OPEN:0 "On"
RULE_NUKES_KILED_POPULATION_OPEN_DESC:0 "Nukes kill local population (thermonukes are stronger)."
RULE_NUKE_RADIATION_LEVEL:0 "Radiation Damage"
RULE_OPTION_NUKE_RADIATION_LEVEL_CLOTURE:0 "Off"
RULE_NUKE_RADIATION_LEVEL_CLOTURE_DESC:0 "Same as vanilla."
RULE_OPTION_NUKE_RADIATION_LEVEL_OPEN:0 "On"
RULE_NUKE_RADIATION_LEVEL_OPEN_DESC:0 "Nukes cause radiation, harming local population and troops (thermonukes cause more, neighbors affected)."
RULE_NUKES_ARMY_DAMAGE:0 "Army Damage"
RULE_OPTION_NUKES_ARMY_DAMAGE_CLOTURE:0 "Off"
RULE_NUKES_ARMY_DAMAGE_CLOTURE_DESC:0 "Same as vanilla."
RULE_OPTION_NUKES_ARMY_DAMAGE_OPEN:0 "On"
RULE_NUKES_ARMY_DAMAGE_OPEN_DESC:0 "Nukes destroy all units in state (thermonukes stronger, neighbors affected)."
RULE_NUKES_BUILD_DAMAGE:0 "Building Damage"
RULE_OPTION_NUKES_BUILD_DAMAGE_CLOTURE:0 "Off"
RULE_NUKES_BUILD_DAMAGE_CLOTURE_DESC:0 "Same as vanilla."
RULE_OPTION_NUKES_BUILD_DAMAGE_OPEN:0 "On"
RULE_NUKES_BUILD_DAMAGE_OPEN_DESC:0 "Nukes destroy buildings in state (thermonukes stronger, neighbors affected)."
RULE_NUCLEAR_DETERRENCE_REALISM:0 "Realistic Deterrence"
RULE_OPTION_NUCLEAR_DETERRENCE_REALISM_CLOTURE:0 "Off"
RULE_NUCLEAR_DETERRENCE_REALISM_CLOTURE_DESC:0 "No AI behavior change."
RULE_OPTION_NUCLEAR_DETERRENCE_REALISM_OPEN:0 "On"
RULE_NUCLEAR_DETERRENCE_REALISM_OPEN_DESC:0 "Threatened AI nations become more cautious about starting wars, soften their stance toward the main deterrent, prioritize AA, radar, and forts, and under strong nuclear pressure also push rocketry, reactors, and missile delivery systems."
#   Decisions
Strategic_Nuke_Operation:0 "§LExtension and Guarantee of Defense§!"
Strategic_Nuke_Operation_desc:0 "General, remember: Peace is for building, war is for consuming. Every decision shapes the nation's fate. Without industry, even brave soldiers will run out of ammo."
Make_Public_Nuke:0 "Announce Nuclear Achievement"
Make_Public_Nuke_desc:0 "Commander, remember Oppenheimer's warning: I am become Death, the destroyer of worlds. But here, you are the player."
Arms_Industry:0 "§GArms R&D Bureau§!"
Arms_Industry_desc:0 "In this chaotic world, power speaks. To deal with bullies, you need a strong fist."
Arms_Industry_0:0 "§RArms Bureau Paused§!"
new_high_technology:0 "§CNew Industrialization§!"
The_Beacon_Project:0 "§HBeacon Project§!"
The_Beacon_Project_desc:0 "A war without smoke. We are the vanguard. Every weapon is a witness to the era."
Weapons_Production_Lines:0 "§HWeaver Project§!"
Weapons_Production_Lines_desc:0 "A secret, ambitious plan to develop and produce advanced weapons for military superiority."
Planning_Department:0 "§GScience Research Dept.§!"
Planning_Department_desc:0 "Tech is key to victory. Only by advancing can we win wars."
Planning_Department_0:0 "§RResearch Dept. Stopped§!"
technology_laboratory:0 "§CScience Lab§!"
Blueprint_Program:0 "§HBlueprint Program§!"
Blueprint_Program_desc:0 "Tech strength decides a nation's fate."
Army_Staff:0 "§GArmy Staff Center§!"
Army_Staff_desc:0 "Unless every soldier knows he's defending the nation, all defenses are useless."
Army_Staff_0:0 "§RStaff Center Closed§!"
quality_of_soldiers:0 "§CInfantry Quality§!"
All_military_drill:0 "§HJoint Drill§!"
All_military_drill_desc:0 "Your task is tough. The enemy is elite and battle-hardened."
